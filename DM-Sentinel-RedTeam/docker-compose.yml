# DM Sentinel Red Team - Infrastructure Stack
# Docker Compose configuration for Gophish + Moodle
# Optimized for low-resource VPS (2GB RAM, 2 CPU cores)
# 
# Tech Lead: DM Sentinel Security Team
# Date: 2025-03-12
# Version: 1.0.0

version: '3.8'

networks:
  redteam_network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/16

volumes:
  gophish_data:
    driver: local
  moodle_data:
    driver: local
  moodle_db_data:
    driver: local
  nginx_certs:
    driver: local
  nginx_conf:
    driver: local

services:
  # ==========================================
  # GOPHISH - Phishing Simulation Platform
  # ==========================================
  gophish:
    image: gophish/gophish:latest
    container_name: dm_gophish
    restart: unless-stopped
    ports:
      - "3333:3333"  # Admin interface (internal only)
      - "8080:80"    # Phishing server (public)
    volumes:
      - gophish_data:/app/gophish
      - ./config/gophish/config.json:/app/gophish/config.json:ro
      - ./logs/gophish:/app/gophish/logs
    environment:
      - GOPHISH_INITIAL_ADMIN_PASSWORD=${GOPHISH_ADMIN_PASSWORD:-DM_Sentinel_2025!}
      - TZ=America/Sao_Paulo
    networks:
      redteam_network:
        ipv4_address: 172.28.0.10
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3333/login"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 256M

  # ==========================================
  # MOODLE DATABASE - MariaDB
  # ==========================================
  moodle_db:
    image: mariadb:10.11
    container_name: dm_moodle_db
    restart: unless-stopped
    environment:
      - MYSQL_ROOT_PASSWORD=${MOODLE_DB_ROOT_PASSWORD:-DM_Moodle_Root_2025!}
      - MYSQL_DATABASE=moodle
      - MYSQL_USER=moodleuser
      - MYSQL_PASSWORD=${MOODLE_DB_PASSWORD:-DM_Moodle_User_2025!}
      - TZ=America/Sao_Paulo
    volumes:
      - moodle_db_data:/var/lib/mysql
      - ./config/mysql/my.cnf:/etc/mysql/conf.d/custom.cnf:ro
    networks:
      redteam_network:
        ipv4_address: 172.28.0.20
    command: >
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
      --max_connections=50
      --innodb_buffer_pool_size=128M
      --innodb_log_file_size=32M
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MOODLE_DB_ROOT_PASSWORD:-DM_Moodle_Root_2025!}"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 256M

  # ==========================================
  # MOODLE - Learning Management System
  # ==========================================
  moodle:
    image: bitnami/moodle:4.3
    container_name: dm_moodle
    restart: unless-stopped
    ports:
      - "8081:8080"   # HTTP (will be proxied)
      - "8443:8443"   # HTTPS (will be proxied)
    depends_on:
      moodle_db:
        condition: service_healthy
    environment:
      # Database Configuration
      - MOODLE_DATABASE_HOST=moodle_db
      - MOODLE_DATABASE_PORT_NUMBER=3306
      - MOODLE_DATABASE_NAME=moodle
      - MOODLE_DATABASE_USER=moodleuser
      - MOODLE_DATABASE_PASSWORD=${MOODLE_DB_PASSWORD:-DM_Moodle_User_2025!}
      
      # Moodle Admin Configuration
      - MOODLE_USERNAME=admin
      - MOODLE_PASSWORD=${MOODLE_ADMIN_PASSWORD:-DM_Admin_2025!}
      - MOODLE_EMAIL=${MOODLE_ADMIN_EMAIL:-admin@dmsentinel.redteam}
      - MOODLE_SITE_NAME=DM Sentinel Learning Platform
      
      # Site Configuration
      - MOODLE_HOST=${MOODLE_HOST:-lms.dmsentinel.redteam}
      - MOODLE_REVERSEPROXY=yes
      - MOODLE_SSLPROXY=yes
      
      # Performance Optimization
      - PHP_MEMORY_LIMIT=256M
      - PHP_MAX_EXECUTION_TIME=300
      - PHP_POST_MAX_SIZE=50M
      - PHP_UPLOAD_MAX_FILESIZE=50M
      
      # Timezone
      - TZ=America/Sao_Paulo
    volumes:
      - moodle_data:/bitnami/moodle
      - ./logs/moodle:/opt/bitnami/apache/logs
    networks:
      redteam_network:
        ipv4_address: 172.28.0.30
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/login/index.php"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1024M
        reservations:
          cpus: '0.5'
          memory: 512M

  # ==========================================
  # NGINX - Reverse Proxy & SSL Termination
  # ==========================================
  nginx:
    image: nginx:alpine
    container_name: dm_nginx
    restart: unless-stopped
    ports:
      - "80:80"       # HTTP
      - "443:443"     # HTTPS
    depends_on:
      - gophish
      - moodle
    volumes:
      - ./config/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./config/nginx/conf.d:/etc/nginx/conf.d:ro
      - nginx_certs:/etc/nginx/certs:ro
      - ./logs/nginx:/var/log/nginx
    networks:
      redteam_network:
        ipv4_address: 172.28.0.5
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 128M
        reservations:
          cpus: '0.1'
          memory: 64M

  # ==========================================
  # POSTFIX - Mail Server (SMTP)
  # ==========================================
  postfix:
    image: boky/postfix:latest
    container_name: dm_postfix
    restart: unless-stopped
    ports:
      - "25:25"      # SMTP
      - "587:587"    # SMTP Submission
    environment:
      # Domain Configuration
      - HOSTNAME=${MAIL_HOSTNAME:-mail.dmsentinel.redteam}
      - ALLOWED_SENDER_DOMAINS=${MAIL_DOMAIN:-dmsentinel.redteam}
      
      # Authentication
      - POSTFIX_myhostname=${MAIL_HOSTNAME:-mail.dmsentinel.redteam}
      - POSTFIX_mydomain=${MAIL_DOMAIN:-dmsentinel.redteam}
      
      # Security
      - POSTFIX_smtpd_tls_cert_file=/etc/ssl/certs/mail.crt
      - POSTFIX_smtpd_tls_key_file=/etc/ssl/private/mail.key
      - POSTFIX_smtpd_use_tls=yes
      - POSTFIX_smtpd_tls_security_level=may
      
      # Rate Limiting
      - POSTFIX_smtpd_client_connection_rate_limit=10
      - POSTFIX_smtpd_client_message_rate_limit=20
      
      # Logging
      - LOG_FORMAT=json
      - TZ=America/Sao_Paulo
    volumes:
      - ./config/postfix/main.cf:/etc/postfix/main.cf:ro
      - ./config/postfix/certs:/etc/ssl/certs:ro
      - ./config/postfix/private:/etc/ssl/private:ro
      - ./logs/postfix:/var/log/postfix
    networks:
      redteam_network:
        ipv4_address: 172.28.0.40
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "25"]
      interval: 30s
      timeout: 10s
      retries: 3
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 256M
        reservations:
          cpus: '0.1'
          memory: 128M

  # ==========================================
  # REDIS - Caching Layer (Optional)
  # ==========================================
  redis:
    image: redis:7-alpine
    container_name: dm_redis
    restart: unless-stopped
    command: >
      redis-server
      --maxmemory 64mb
      --maxmemory-policy allkeys-lru
      --save 900 1
      --save 300 10
      --save 60 10000
    volumes:
      - ./data/redis:/data
    networks:
      redteam_network:
        ipv4_address: 172.28.0.50
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "2"
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 128M
        reservations:
          cpus: '0.1'
          memory: 64M

  # ==========================================
  # WATCHTOWER - Auto-Update Containers
  # ==========================================
  watchtower:
    image: containrrr/watchtower:latest
    container_name: dm_watchtower
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - WATCHTOWER_CLEANUP=true
      - WATCHTOWER_POLL_INTERVAL=86400  # 24 hours
      - WATCHTOWER_INCLUDE_STOPPED=false
      - TZ=America/Sao_Paulo
    networks:
      redteam_network:
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "2"
    deploy:
      resources:
        limits:
          cpus: '0.1'
          memory: 64M

# ==========================================
# CONFIGURATION NOTES
# ==========================================
#
# RESOURCE ALLOCATION (Total: ~2GB RAM, 2 CPUs):
# - Gophish:    512MB RAM, 0.5 CPU
# - Moodle:     1024MB RAM, 1.0 CPU
# - MariaDB:    512MB RAM, 0.5 CPU
# - Others:     ~500MB RAM, 0.5 CPU (combined)
#
# DEPLOYMENT STEPS:
# 1. Copy .env.example to .env and configure variables
# 2. Create required directories:
#    mkdir -p config/{gophish,nginx/conf.d,postfix/{certs,private},mysql} logs/{gophish,moodle,nginx,postfix} data/redis
# 3. Generate SSL certificates (see infrastructure_setup.md)
# 4. Configure DNS records (see infrastructure_setup.md)
# 5. Deploy: docker-compose up -d
# 6. Check logs: docker-compose logs -f
# 7. Verify health: docker-compose ps
#
# SECURITY CONSIDERATIONS:
# - Change all default passwords in .env
# - Use strong SSL/TLS certificates
# - Enable firewall (UFW): allow 80,443,25,587
# - Configure fail2ban for brute force protection
# - Regular backups of volumes
# - Monitor resource usage
# - Rotate logs regularly
#
# MAINTENANCE:
# - Backup: docker-compose exec moodle_db mysqldump -u root -p moodle > backup.sql
# - Restore: docker-compose exec -T moodle_db mysql -u root -p moodle < backup.sql
# - Update: docker-compose pull && docker-compose up -d
# - Logs: docker-compose logs --since 1h -f [service]
