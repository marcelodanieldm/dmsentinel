# DM Sentinel API Shield - Docker Compose
# Production-ready deployment with Redis

version: '3.8'

services:
  # ============================================================================
  # API Shield Service
  # ============================================================================
  api-shield:
    build:
      context: .
      dockerfile: Dockerfile
    image: dm-sentinel-api-shield:latest
    container_name: api-shield
    restart: unless-stopped
    
    ports:
      - "8080:8080"
      - "9090:9090"  # Prometheus metrics
    
    environment:
      # Server
      - HOST=0.0.0.0
      - PORT=8080
      - ENVIRONMENT=production
      
      # JWT
      - JWT_SECRET=${JWT_SECRET:-change-me-in-production}
      - JWT_ALGORITHM=HS256
      - JWT_EXPIRATION_HOURS=24
      
      # Redis
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_DB=0
      
      # Rate Limiting
      - DEFAULT_RATE_LIMIT=100
      - DEFAULT_BURST_SIZE=20
      
      # Threat Detection
      - ENABLE_THREAT_DETECTION=true
      
      # Monitoring
      - ENABLE_PROMETHEUS=true
      - LOG_LEVEL=INFO
    
    depends_on:
      - redis
    
    networks:
      - api-shield-network
    
    volumes:
      - ./config.yaml:/app/config.yaml:ro
      - ./logs:/app/logs
    
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
  
  # ============================================================================
  # Redis Service (Rate Limiting Storage)
  # ============================================================================
  redis:
    image: redis:7-alpine
    container_name: redis-api-shield
    restart: unless-stopped
    
    ports:
      - "6379:6379"
    
    command: >
      redis-server
      --appendonly yes
      --appendfsync everysec
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
    
    volumes:
      - redis-data:/data
    
    networks:
      - api-shield-network
    
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
  
  # ============================================================================
  # Redis Commander (Optional - Web UI for Redis)
  # ============================================================================
  redis-commander:
    image: rediscommander/redis-commander:latest
    container_name: redis-commander
    restart: unless-stopped
    
    ports:
      - "8081:8081"
    
    environment:
      - REDIS_HOSTS=local:redis:6379
    
    depends_on:
      - redis
    
    networks:
      - api-shield-network
    
    profiles:
      - debug
  
  # ============================================================================
  # Prometheus (Metrics Collection)
  # ============================================================================
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    restart: unless-stopped
    
    ports:
      - "9091:9090"
    
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
    
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    
    networks:
      - api-shield-network
    
    profiles:
      - monitoring
  
  # ============================================================================
  # Grafana (Metrics Visualization)
  # ============================================================================
  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    restart: unless-stopped
    
    ports:
      - "3000:3000"
    
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
    
    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana/dashboards:/etc/grafana/provisioning/dashboards
      - ./grafana/datasources:/etc/grafana/provisioning/datasources
    
    depends_on:
      - prometheus
    
    networks:
      - api-shield-network
    
    profiles:
      - monitoring

# ============================================================================
# Networks
# ============================================================================
networks:
  api-shield-network:
    driver: bridge

# ============================================================================
# Volumes
# ============================================================================
volumes:
  redis-data:
    driver: local
  prometheus-data:
    driver: local
  grafana-data:
    driver: local
